spring.application.name=FinanceTracker

# ===============================
# 🌐 SERVER CONFIG
# ===============================
server.port=8080
server.error.whitelabel.enabled=false

# ===============================
# 🗄️ DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/financetracker
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 🔐 OAUTH2 GOOGLE CONFIG
# ===============================
spring.security.oauth2.client.registration.google.client-id=GOGGLE-CLIENT-ID
spring.security.oauth2.client.registration.google.client-secret=GOGGLE-CLIENT-SECRET-KEY
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
